<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>3분 즉석포토 </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#161217; --surface:#241a28; --pink:#FF3D8A;
    --yellow:#FFD23F; --cream:#F7F1E8; --line:rgba(247,241,232,0.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;width:100%;
    background:var(--bg);color:var(--cream);
    font-family:'Space Grotesk',sans-serif;
    overflow:hidden;-webkit-user-select:none;user-select:none;
  }
  #app{position:relative;height:100%;width:100%;}
  .screen{
    position:absolute;inset:0;display:none;
    flex-direction:column;align-items:center;justify-content:center;padding:32px;
  }
  .screen.active{display:flex;}

  /* ── 설정 화면 ── */
  #screen-setup{
    background:
      radial-gradient(circle at 18% 20%,rgba(255,61,138,0.35),transparent 45%),
      radial-gradient(circle at 82% 78%,rgba(255,210,63,0.25),transparent 45%),
      var(--bg);
    gap:0;padding:28px;
  }
  .setup-box{width:100%;max-width:640px;display:flex;flex-direction:column;gap:20px;}
  .setup-title{font-family:'Anton',sans-serif;font-size:clamp(32px,6vw,64px);line-height:1;margin:0 0 4px 0;color:var(--cream);}
  .setup-title span{color:var(--pink);}
  .setup-sub{font-size:15px;opacity:0.6;margin-bottom:8px;}
  .upload-row{display:flex;gap:14px;flex-wrap:wrap;}
  .upload-card{
    flex:1;min-width:200px;background:var(--surface);border-radius:16px;
    padding:18px;display:flex;flex-direction:column;gap:12px;border:1.5px solid var(--line);
  }
  .upload-card label.card-label{font-size:13px;opacity:0.65;letter-spacing:0.1em;text-transform:uppercase;}
  .upload-card .badge{
    font-size:11px;padding:3px 9px;border-radius:999px;
    background:rgba(255,210,63,0.15);color:var(--yellow);width:fit-content;
  }
  .upload-preview{
    width:100%;height:110px;border-radius:10px;
    background:rgba(247,241,232,0.04);border:1.5px dashed var(--line);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;cursor:pointer;position:relative;transition:border-color .2s;
  }
  .upload-preview:hover{border-color:rgba(247,241,232,0.35);}
  .upload-preview img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:8px;}
  .upload-preview .plus{font-size:28px;opacity:0.25;}
  .upload-preview .clear-btn{
    position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;
    background:rgba(22,18,23,0.7);color:var(--cream);font-size:13px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:3;
  }
  input[type=file]{display:none;}

  .btn{
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;
    color:white;background:var(--pink);border:none;border-radius:999px;
    padding:18px 48px;cursor:pointer;transition:transform .15s ease;
    letter-spacing:0.01em;align-self:center;
  }
  .btn:active{transform:scale(0.96);}
  .btn-ghost{
    background:transparent;color:var(--cream);
    border:1.5px solid var(--line);font-size:16px;padding:14px 36px;
  }
  .btn-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}

  /* ── START 화면 ── */
  #screen-start{background-size:cover;background-position:center;text-align:center;}
  #screen-start.no-bg{
    background:
      radial-gradient(circle at 18% 20%,rgba(255,61,138,0.35),transparent 45%),
      radial-gradient(circle at 82% 78%,rgba(255,210,63,0.25),transparent 45%),
      var(--bg);
  }
  .start-overlay{position:absolute;inset:0;background:rgba(22,18,23,0.45);}
  #screen-start.no-bg .start-overlay{display:none;}
  .start-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;}
  .eyebrow{font-size:15px;letter-spacing:0.3em;text-transform:uppercase;color:var(--yellow);margin-bottom:16px;opacity:0.9;}
  h1.title{
    font-family:'Anton',sans-serif;
    font-size:clamp(52px,10vw,120px);line-height:0.95;margin:0 0 20px 0;color:var(--cream);
  }
  h1.title span{color:var(--pink);}
  .subtitle{
    font-size:17px;line-height:1.75;opacity:0.8;
    margin-bottom:44px;max-width:420px;
  }
  .settings-btn{
    position:absolute;top:20px;right:20px;z-index:10;
    background:rgba(22,18,23,0.5);border:1.5px solid var(--line);
    color:var(--cream);border-radius:999px;padding:8px 18px;
    font-size:13px;cursor:pointer;backdrop-filter:blur(8px);
    font-family:'Space Grotesk',sans-serif;font-weight:600;
  }

  /* ── 카메라 ── */
  #screen-camera{background:#000;padding:0;}
  .cam-wrap{position:relative;height:100%;width:100%;}
  video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  .frame-count{position:absolute;top:24px;left:24px;display:flex;gap:8px;z-index:5;}
  .frame-count .dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--cream);opacity:0.4;}
  .frame-count .dot.done{background:var(--pink);border-color:var(--pink);opacity:1;}
  .frame-count .dot.live{border-color:var(--yellow);opacity:1;}
  .countdown-num{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:'Anton',sans-serif;font-size:min(40vw,320px);
    color:var(--cream);text-shadow:0 0 60px rgba(0,0,0,0.6);
    z-index:6;pointer-events:none;
  }
  .flash{position:absolute;inset:0;background:white;opacity:0;z-index:7;pointer-events:none;}
  .flash.go{animation:flashpop 280ms ease-out;}
  @keyframes flashpop{0%{opacity:0;}12%{opacity:1;}100%{opacity:0;}}
  .cam-footer{
    position:absolute;bottom:80px;left:0;right:0;
    text-align:center;z-index:5;
    font-size:14px;letter-spacing:0.18em;text-transform:uppercase;
    color:rgba(247,241,232,0.65);
  }
  /* 취소 버튼 */
  .cam-cancel{
    position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
    z-index:8;background:rgba(22,18,23,0.65);
    color:var(--cream);border:1.5px solid rgba(247,241,232,0.25);
    border-radius:999px;padding:12px 36px;
    font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;
    cursor:pointer;backdrop-filter:blur(8px);
  }

  /* ── 결과 ── */
  #screen-result{background:var(--bg);overflow-y:auto;justify-content:flex-start;padding-top:36px;padding-bottom:36px;}
  .result-wrap{
    display:flex;gap:40px;align-items:flex-start;justify-content:center;
    flex-wrap:wrap;max-width:1000px;width:100%;
  }
  .filmstrip-holder{
    background:var(--surface);padding:14px 14px 22px 14px;
    border-radius:6px;box-shadow:0 30px 60px rgba(0,0,0,0.45);flex-shrink:0;
  }
  #resultCanvas{display:block;border-radius:2px;width:220px;height:auto;}
  .right-panel{
    display:flex;flex-direction:column;gap:20px;align-items:center;max-width:260px;
  }
  .dl-panel{
    background:var(--cream);color:var(--bg);
    border-radius:18px;padding:24px;
    display:flex;flex-direction:column;align-items:center;
    gap:12px;width:100%;
  }
  .dl-panel .dl-label{font-family:'Anton',sans-serif;font-size:20px;}
  .dl-icon{font-size:52px;line-height:1;}
  .dl-hint{font-size:13px;opacity:0.65;text-align:center;line-height:1.6;}
  /* 안내 문구 패널 */
  .info-panel{
    background:var(--surface);border:1.5px solid var(--line);
    border-radius:18px;padding:22px;
    display:flex;flex-direction:column;align-items:center;
    gap:8px;width:100%;text-align:center;
  }
  .info-panel .info-title{
    font-size:13px;letter-spacing:0.2em;text-transform:uppercase;
    color:var(--yellow);font-weight:600;margin-bottom:4px;
  }
  .info-panel .info-body{font-size:15px;line-height:1.75;opacity:0.9;}
  .info-panel .info-insta{
    font-family:'Anton',sans-serif;font-size:18px;
    color:var(--pink);margin-top:2px;
  }
  #instaQR img{ width:120px !important; height:120px !important; border-radius:6px; }
  .result-actions{margin-top:24px;display:flex;gap:14px;}

  .hidden-canvas{display:none;}
  .corner-tag{
    position:absolute;bottom:14px;right:18px;
    font-size:11px;letter-spacing:0.2em;text-transform:uppercase;opacity:0.2;
  }
</style>
</head>
<body>
<div id="app">

  <!-- ① 설정 화면 -->
  <section id="screen-setup" class="screen active">
    <div class="setup-box">
      <div>
        <h1 class="setup-title">이미지 설정<span>.</span></h1>
        <p class="setup-sub">이미지를 올리면 자동 적용돼요. 건너뛰면 기본 디자인이 사용됩니다.</p>
      </div>
      <div class="upload-row">
        <div class="upload-card">
          <label class="card-label">메인 화면 배경</label>
          <div class="badge">JPG / PNG</div>
          <div class="upload-preview" id="bgPreview" onclick="document.getElementById('bgInput').click()">
            <span class="plus">＋</span>
          </div>
          <input type="file" id="bgInput" accept="image/*">
        </div>
        <div class="upload-card">
          <label class="card-label">사진 위 프레임</label>
          <div class="badge">투명 PNG 권장</div>
          <div class="upload-preview" id="framePreview" onclick="document.getElementById('frameInput').click()">
            <span class="plus">＋</span>
          </div>
          <input type="file" id="frameInput" accept="image/*">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" id="btnSkipSetup">건너뛰기</button>
        <button class="btn" id="btnApplySetup">적용하고 시작</button>
      </div>
    </div>
  </section>

  <!-- ② 시작 화면 -->
  <section id="screen-start" class="screen no-bg">
    <div class="start-overlay"></div>
    <button class="settings-btn" id="btnGoSettings">⚙ 이미지 변경</button>
    <div class="start-content">
      <div class="eyebrow">예술로 항해</div>
      <h1 class="title">3분 즉석 <span>포토</span></h1>
      <div class="subtitle">
        [촬영시작] 버튼을 누르면<br>
        5초 카운트 뒤 4컷사진이 촬영됩니다
      </div>
      <button class="btn" id="btnStart">촬영 시작</button>
    </div>
  </section>

  <!-- ③ 카메라 -->
  <section id="screen-camera" class="screen">
    <div class="cam-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="flash" id="flash"></div>
      <div class="countdown-num" id="countdownNum"></div>
      <div class="frame-count" id="frameCount">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <div class="cam-footer" id="camFooter">준비하세요</div>
      <button class="cam-cancel" id="btnCancel">✕ 촬영 취소</button>
    </div>
  </section>

  <!-- ④ 결과 -->
  <section id="screen-result" class="screen">
    <div class="result-wrap">
      <div class="filmstrip-holder">
        <canvas id="resultCanvas" width="480" height="1440"></canvas>
      </div>
      <div class="right-panel">
        <div class="dl-panel">
          <div class="dl-label">저장하기</div>
        </div>
        <div class="info-panel">
          <div class="info-title">사진 수령 방법</div>
          <div id="instaQR"></div>
          <div class="info-body">인스타그램</div>
          <div class="info-insta">@ARTLANDHO</div>
          <div class="info-body">팔로우 후 DM을 보내주세요!</div>
        </div>
      </div>
    </div>
    <div class="result-actions">
      <button class="btn btn-ghost" id="btnRetake">다시 찍기</button>
      <button class="btn" id="btnDownload">저장</button>
    </div>
  </section>

  <div class="corner-tag">life4cut · web edition</div>
</div>
<canvas id="shotCanvas" class="hidden-canvas"></canvas>

<script>
let bgDataUrl    = null;
let frameDataUrl = null;
let stream       = null;
let shots        = [];
let cancelled    = false;

/* ── 화면 전환 ── */
const allScreens = document.querySelectorAll('.screen');
function showScreen(id){
  allScreens.forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

/* ── 이미지 업로드 ── */
function bindUpload(inputId,previewId,setter){
  const input=document.getElementById(inputId);
  const preview=document.getElementById(previewId);
  input.addEventListener('change',e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const url=ev.target.result;
      setter(url);
      preview.innerHTML=`<img src="${url}"><div class="clear-btn" onclick="clearImg('${inputId}','${previewId}')">✕</div>`;
    };
    reader.readAsDataURL(file);
  });
}
function clearImg(inputId,previewId){
  document.getElementById(inputId).value='';
  document.getElementById(previewId).innerHTML='<span class="plus">＋</span>';
  if(inputId==='bgInput') bgDataUrl=null;
  else frameDataUrl=null;
}
function setBg(url){bgDataUrl=url;}
function setFrame(url){frameDataUrl=url;}
bindUpload('bgInput','bgPreview',setBg);
bindUpload('frameInput','framePreview',setFrame);

/* ── 설정 적용 ── */
function applyAndGo(){
  const s=document.getElementById('screen-start');
  if(bgDataUrl){ s.style.backgroundImage=`url(${bgDataUrl})`; s.classList.remove('no-bg'); }
  else{ s.style.backgroundImage=''; s.classList.add('no-bg'); }
  showScreen('start');
}
document.getElementById('btnApplySetup').addEventListener('click',applyAndGo);
document.getElementById('btnSkipSetup').addEventListener('click',applyAndGo);
document.getElementById('btnGoSettings').addEventListener('click',()=>showScreen('setup'));

/* ── 카메라 ── */
const video       = document.getElementById('video');
const shotCanvas  = document.getElementById('shotCanvas');
const countdownEl = document.getElementById('countdownNum');
const flashEl     = document.getElementById('flash');
const camFooter   = document.getElementById('camFooter');
const dots        = [...document.querySelectorAll('#frameCount .dot')];

async function initCamera(){
  if(stream) return;
  stream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:'user',width:{ideal:1280},height:{ideal:960}},audio:false
  });
  video.srcObject=stream;
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function captureFrame(){
  const w=video.videoWidth,h=video.videoHeight;
  shotCanvas.width=w; shotCanvas.height=h;
  const ctx=shotCanvas.getContext('2d');
  ctx.translate(w,0); ctx.scale(-1,1);
  ctx.drawImage(video,0,0,w,h);
  return shotCanvas.toDataURL('image/jpeg',0.92);
}

async function shootWithCountdown(sec){
  for(let i=sec;i>=1;i--){
    if(cancelled) return null;
    countdownEl.textContent=i; countdownEl.style.opacity=1;
    await sleep(1000);
    if(cancelled) return null;
  }
  countdownEl.style.opacity=0;
  flashEl.classList.remove('go'); void flashEl.offsetWidth; flashEl.classList.add('go');
  await sleep(120);
  return captureFrame();
}

async function runSession(){
  shots=[]; cancelled=false;
  dots.forEach(d=>d.classList.remove('done','live'));
  showScreen('camera');
  camFooter.textContent='카메라 준비 중...';
  try{ await initCamera(); }
  catch(e){
    alert('카메라 접근 실패: '+e.message+'\nhttps:// 주소에서 열어주세요.');
    showScreen('start'); return;
  }
  for(let i=0;i<4;i++){
    if(cancelled) return;
    dots[i].classList.add('live');
    camFooter.textContent=`${i+1} / 4 컷 · 포즈를 잡아주세요`;
    const shot=await shootWithCountdown(5);
    if(cancelled) return;
    shots.push(shot);
    dots[i].classList.remove('live');
    dots[i].classList.add('done');
    await sleep(350);
  }
  if(cancelled) return;
  camFooter.textContent='완료!';
  await sleep(350);
  buildFilmStrip();
}

/* ── 취소 ── */
document.getElementById('btnCancel').addEventListener('click',()=>{
  cancelled=true;
  countdownEl.style.opacity=0;
  showScreen('start');
});

/* ── 합성 ── */
const resultCanvas=document.getElementById('resultCanvas');
function loadImg(src){
  return new Promise(res=>{const img=new Image();img.onload=()=>res(img);img.src=src;});
}

async function buildFilmStrip(){
  const FRAME_SLOTS=[
    {x:30,y:31, w:420,h:249},
    {x:30,y:310,w:420,h:250},
    {x:30,y:590,w:419,h:245},
    {x:30,y:865,w:420,h:250},
  ];
  const W=480;
  const H=frameDataUrl?1400:(24*2+328*4+14*3+80);
  resultCanvas.width=W; resultCanvas.height=H;
  const ctx=resultCanvas.getContext('2d');

  if(frameDataUrl){
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);
    for(let i=0;i<4;i++){
      const img=await loadImg(shots[i]);
      const {x,y,w,h}=FRAME_SLOTS[i];
      const ir=img.width/img.height,cr=w/h;
      let sx,sy,sw,sh;
      if(ir>cr){sh=img.height;sw=sh*cr;sy=0;sx=(img.width-sw)/2;}
      else{sw=img.width;sh=sw/cr;sx=0;sy=(img.height-sh)/2;}
      ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h);
    }
    const frame=await loadImg(frameDataUrl);
    ctx.drawImage(frame,0,0,W,H);
  } else {
    const PAD=24,GAP=14,cellH=328;
    ctx.fillStyle='#F7F1E8'; ctx.fillRect(0,0,W,H);
    for(let i=0;i<4;i++){
      const img=await loadImg(shots[i]);
      const x=PAD,y=PAD+i*(cellH+GAP),w=W-PAD*2,h=cellH;
      const ir=img.width/img.height,cr=w/h;
      let sx,sy,sw,sh;
      if(ir>cr){sh=img.height;sw=sh*cr;sy=0;sx=(img.width-sw)/2;}
      else{sw=img.width;sh=sw/cr;sx=0;sy=(img.height-sh)/2;}
      ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h);
    }
    ctx.fillStyle='#161217'; ctx.textAlign='center';
    ctx.font="bold 26px 'Anton',sans-serif";
    ctx.fillText('3분 즉석포토',W/2,H-60);
    ctx.font="13px 'Space Grotesk',sans-serif";
    ctx.fillStyle='rgba(22,18,23,0.5)';
    const d=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'});
    ctx.fillText(d,W/2,H-36);
  }
  showScreen('result');
}

/* ── 인스타그램 QR ── */
new QRCode(document.getElementById('instaQR'), {
  text: 'https://www.instagram.com/artlandho',
  width: 120, height: 120,
  colorDark: '#161217', colorLight: '#F7F1E8'
});

/* ── 버튼 ── */
document.getElementById('btnStart').addEventListener('click',runSession);
document.getElementById('btnRetake').addEventListener('click',()=>showScreen('start'));
document.getElementById('btnDownload').addEventListener('click',()=>{
  const a=document.createElement('a');
  a.download=`photo_${Date.now()}.jpg`;
  a.href=resultCanvas.toDataURL('image/jpeg',0.95);
  a.click();
});
</script>
</body>
</html>
